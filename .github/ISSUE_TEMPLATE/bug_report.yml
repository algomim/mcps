name: Bug report
description: Report a reproducible problem in Algomim AEC MCP.
title: "fix: "
labels: ["bug", "needs-triage"]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues first.
          required: true
        - label: This is not a security vulnerability.
          required: true
  - type: dropdown
    id: host
    attributes:
      label: Host
      options:
        - Revit
        - AutoCAD
        - Shared MCP tooling
        - Installer or release
        - Documentation
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.11 or commit SHA"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Windows version, Autodesk version, .NET runtime if relevant"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Keep this short and specific.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove model secrets, tokens, private paths, and customer data before posting.
    validations:
      required: false
