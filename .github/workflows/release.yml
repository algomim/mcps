name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve release version
        id: release_version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tags must use vX.Y.Z format. Got '$tag'."
          }

          $version = $tag.Substring(1)
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Check release version metadata
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/version.ps1 -Version "${{ steps.release_version.outputs.version }}" -Check

      - name: Build common packages
        shell: pwsh
        run: |
          dotnet build src/common/Algomim.Aec.Mcp.Abstractions/Algomim.Aec.Mcp.Abstractions.csproj -c Release
          dotnet build src/common/Algomim.Aec.Mcp.Core/Algomim.Aec.Mcp.Core.csproj -c Release
          dotnet build src/common/Algomim.Aec.Mcp.Tooling/Algomim.Aec.Mcp.Tooling.csproj -c Release

      - name: Build Revit host packages
        shell: pwsh
        run: |
          dotnet build src/hosts/revit/Algomim.Revit.Mcp.2025/Algomim.Revit.Mcp.2025.csproj -c Release
          dotnet build src/hosts/revit/Algomim.Revit.Mcp.2026/Algomim.Revit.Mcp.2026.csproj -c Release
          dotnet build src/hosts/revit/Algomim.Revit.Mcp.2027/Algomim.Revit.Mcp.2027.csproj -c Release

      - name: Test host-neutral suites
        shell: pwsh
        run: |
          dotnet test tests/revit/Algomim.Revit.Mcp.Tests/Algomim.Revit.Mcp.Tests.csproj -c Release
          dotnet test tests/autocad/Algomim.AutoCad.Mcp.Tests/Algomim.AutoCad.Mcp.Tests.csproj -c Release

      - name: Install or update WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          if ($LASTEXITCODE -ne 0) {
            dotnet tool update --global wix
          }

      - name: Build cloud-safe Revit MSI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          wix build -acceptEula wix7 -arch x64 installer/revit-mcp.wxs -o dist/revit-mcp-${{ steps.release_version.outputs.version }}.msi

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-ChildItem dist -Filter *.msi | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLowerInvariant())  $($_.Name)" |
              Set-Content -Encoding ascii "$($_.FullName).sha256"
          }

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/revit-mcp-${{ steps.release_version.outputs.version }}.msi
            dist/revit-mcp-${{ steps.release_version.outputs.version }}.msi.sha256
          generate_release_notes: true
          body: |
            This draft was created by the cloud-safe release workflow.

            Before publishing:
            - Build `autocad-mcp-${{ steps.release_version.outputs.version }}.msi` on an approved Autodesk workstation.
            - Upload `autocad-mcp-${{ steps.release_version.outputs.version }}.msi` and its `.sha256` file to this draft.
            - Smoke test the Revit and AutoCAD installers.
            - Run the `publish-release` workflow with the required confirmation.
