name: publish-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in X.Y.Z form
        required: true
        type: string
      smoke_tests_completed:
        description: All release-supported host installer smoke tests are complete
        required: true
        type: boolean
      confirm:
        description: Type PUBLISH to make the draft release public
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify draft assets and publish
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          SMOKE_TESTS_COMPLETED: ${{ inputs.smoke_tests_completed }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if ($env:VERSION -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must use X.Y.Z format. Got '$env:VERSION'."
          }

          if ($env:SMOKE_TESTS_COMPLETED -ne 'true') {
            throw "All release-supported host smoke tests must be completed before publishing."
          }

          if ($env:CONFIRM -ne 'PUBLISH') {
            throw "Type PUBLISH in the confirmation input to publish the draft release."
          }

          $tag = "v$env:VERSION"
          $headers = @{
            "Authorization" = "Bearer $env:GH_TOKEN"
            "Accept" = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "algomim-release-publish"
          }

          $release = $null
          $page = 1
          do {
            $pageReleases = @(Invoke-RestMethod `
              -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases?per_page=100&page=$page" `
              -Headers $headers)
            $release = $pageReleases | Where-Object { $_.tag_name -eq $tag } | Select-Object -First 1
            $page += 1
          } while ($null -eq $release -and $pageReleases.Count -eq 100)

          if ($null -eq $release) {
            throw "Draft release '$tag' was not found. Create it by pushing the tag first."
          }

          if (-not $release.draft) {
            throw "Release '$tag' is already public or is not a draft."
          }

          $configPath = Join-Path $env:GITHUB_WORKSPACE "release/hosts.json"
          $config = Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json

          $assetNames = @($release.assets | ForEach-Object { $_.name })
          $requiredPatterns = @()
          foreach ($hostConfig in @($config.releaseSupportedHosts)) {
            foreach ($artifact in @($hostConfig.artifacts)) {
              $requiredPatterns += $artifact.assetPattern.Replace("{version}", $env:VERSION)
              $requiredPatterns += $artifact.checksumPattern.Replace("{version}", $env:VERSION)
            }
          }

          $missingAssets = @($requiredPatterns | Where-Object {
            $pattern = $_
            @($assetNames | Where-Object { $_ -like $pattern }).Count -eq 0
          })
          if ($missingAssets.Count -gt 0) {
            throw "Draft release '$tag' is missing required assets: $($missingAssets -join ', ')"
          }

          $assetDir = Join-Path $env:RUNNER_TEMP "release-assets"
          New-Item -ItemType Directory -Force $assetDir | Out-Null
          $downloadHeaders = $headers.Clone()
          $downloadHeaders["Accept"] = "application/octet-stream"

          function Find-ReleaseAsset {
            param([Parameter(Mandatory)][string]$Pattern)

            $matches = @($release.assets | Where-Object { $_.name -like $Pattern })
            if ($matches.Count -eq 0) {
              throw "Required release asset was not found: $Pattern"
            }
            if ($matches.Count -gt 1) {
              throw "Release asset pattern '$Pattern' matched multiple assets: $($matches.name -join ', ')"
            }

            return $matches[0]
          }

          foreach ($hostConfig in @($config.releaseSupportedHosts)) {
            foreach ($artifact in @($hostConfig.artifacts)) {
              $assetPattern = $artifact.assetPattern.Replace("{version}", $env:VERSION)
              $checksumPattern = $artifact.checksumPattern.Replace("{version}", $env:VERSION)
              $asset = Find-ReleaseAsset -Pattern $assetPattern
              $shaAsset = Find-ReleaseAsset -Pattern $checksumPattern
              $assetPath = Join-Path $assetDir $asset.name
              $shaPath = Join-Path $assetDir $shaAsset.name

              Invoke-WebRequest -Uri $asset.url -Headers $downloadHeaders -OutFile $assetPath
              Invoke-WebRequest -Uri $shaAsset.url -Headers $downloadHeaders -OutFile $shaPath

              $actualHash = (Get-FileHash $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
              $expectedText = (Get-Content $shaPath -Raw).ToLowerInvariant()
              if ($expectedText -notmatch [regex]::Escape($actualHash)) {
                throw "Checksum mismatch for '$($asset.name)'."
              }
            }
          }

          $body = @{ draft = $false; prerelease = $false } | ConvertTo-Json
          Invoke-RestMethod `
            -Method Patch `
            -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/$($release.id)" `
            -Headers $headers `
            -ContentType "application/json" `
            -Body $body | Out-Null

          Write-Host "Published release $tag."
